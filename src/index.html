<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pocket Notebook Todo</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
</head>
<body>
  <div id="notebook-container">
    
    <aside id="true-sidebar">
      <div class="sidebar-actions">
        <button id="add-page-btn">+ New Task</button>
        <button id="add-category-btn">+ New Page</button> 
      </div>
    </aside>

    <main id="notebook-page">
      <header class="page-header">
        <h1 id="page-title-input" contenteditable="true" spellcheck="true"></h1>
      </header>

      <div id="Content">
      </div>
      
      <nav id="bottom-page-nav">
        <button id="index-btn">Pages</button> 
      </nav>
    </main>

    <div id="side-tabs"></div>

  </div>
</body>
</html>
